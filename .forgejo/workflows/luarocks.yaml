name: deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: LuaRocks
    runs-on: nix
    steps:
      - uses: actions/checkout@v4
      - name: Wait for quality
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          nix shell nixpkgs#curl nixpkgs#jq -c bash <<'EOF'
          set -eu

          required_contexts='quality / Format (push)
          quality / Lint (push)'
          if grep -q '^  test:' .forgejo/workflows/quality.yaml; then
            required_contexts="${required_contexts}
          quality / Test (push)"
          fi

          deadline="$(($(date +%s) + 3600))"
          while [ "$(date +%s)" -lt "$deadline" ]; do
            payload="$(curl -fsSL \
              -H "Authorization: token $GITHUB_TOKEN" \
              "$SERVER_URL/api/v1/repos/$REPOSITORY/commits/$SHA/status")"
            pending=""
            failed=""

            while IFS= read -r context; do
              [ -n "$context" ] || continue
              status="$(printf '%s' "$payload" | jq -r --arg context "$context" '[.statuses[]? | select(.context == $context)][0].status // ""')"
              case "$status" in
                success) ;;
                error|failure) failed="${failed}${failed:+, }${context}" ;;
                *) pending="${pending}${pending:+, }${context}" ;;
              esac
            done <<CONTEXTS
          $required_contexts
          CONTEXTS

            if [ -n "$failed" ]; then
              echo "Quality checks failed: $failed" >&2
              exit 1
            fi
            if [ -z "$pending" ]; then
              echo "Quality checks passed."
              exit 0
            fi

            echo "Waiting for quality checks: $pending"
            sleep 10
          done

          echo "Timed out waiting for quality checks." >&2
          exit 1
          EOF

      - name: Publish to LuaRocks
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          set -eu
          package="${GITHUB_REPOSITORY#*/}"
          ref_name="${GITHUB_REF_NAME:-}"
          ref_type="${GITHUB_REF_TYPE:-}"

          case "${GITHUB_REF:-}" in
            refs/tags/*)
              ref_name="${GITHUB_REF#refs/tags/}"
              ref_type="tag"
              ;;
          esac

          if [ -z "$ref_name" ] || [ "$ref_type" != "tag" ]; then
            echo "LuaRocks publish must run from a tag ref" >&2
            exit 1
          fi

          summary="$(sed -n "s/.*summary = '\([^']*\)'.*/\1/p" "$package-scm-1.rockspec" | head -n 1)"
          if [ -z "$summary" ]; then
            summary="$package"
          fi

          if [ -z "${GITHUB_EVENT_PATH:-}" ]; then
            mkdir -p .forgejo/luarocks
            printf '{}\n' > .forgejo/luarocks/event.json
            export GITHUB_EVENT_PATH="$PWD/.forgejo/luarocks/event.json"
          fi

          export GITHUB_ACTION_PATH="$PWD"
          export GITHUB_REF_NAME_OVERRIDE="$ref_name"
          export GITHUB_REF_TYPE_OVERRIDE="$ref_type"
          export INPUT_COPY_DIRECTORIES='{{ neovim.plugin.dirs }}'
          export INPUT_LICENSE='GPL-3.0'
          export INPUT_NAME="$package"
          export INPUT_SUMMARY="$summary"
          export INPUT_TEMPLATE="$PWD/.forgejo/luarocks/forgejo-rockspec.template"
          export INPUT_VERSION="$ref_name"

          nix run --accept-flake-config \
            github:nvim-neorocks/luarocks-tag-release#luarocks-tag-release-action
